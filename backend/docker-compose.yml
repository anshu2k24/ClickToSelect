services:
  postgres:
    image: postgres:16
    container_name: ai_interviewer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres@12
      POSTGRES_DB: ai_interviewer_db
    ports:
      - "5432:5432"
    volumes:
      - ai_interviewer_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_interviewer_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ai_interviewer_pgdata: