<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chat — LLaMA 3.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 640px;
            height: 90vh;
            max-height: 820px;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        /* ── Header ── */
        .header {
            padding: 22px 24px;
            background: rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #e2e8f0;
            letter-spacing: -0.3px;
        }
        .header p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }
        .header .status-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #34d399;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Messages ── */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .msg {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg.bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.07);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom-left-radius: 4px;
        }
        .msg.bot code {
            background: rgba(0,0,0,0.3);
            padding: 1px 5px;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
        }
        .msg.bot pre {
            background: rgba(0,0,0,0.35);
            padding: 10px 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 6px 0;
            font-size: 13px;
        }
        .msg.thinking {
            align-self: flex-start;
            color: rgba(255,255,255,0.35);
            font-style: italic;
            background: none;
            border: none;
            padding: 8px 0;
        }
        .msg.thinking::after {
            content: '';
            animation: dots 1.5s steps(3, end) infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            33%  { content: '.'; }
            66%  { content: '..'; }
            100% { content: '...'; }
        }
        .msg.error {
            align-self: flex-start;
            color: #f87171;
            background: rgba(248, 113, 113, 0.08);
            border: 1px solid rgba(248,113,113,0.15);
            border-bottom-left-radius: 4px;
        }

        /* ── Input ── */
        .input-area {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #e2e8f0;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-area input::placeholder { color: rgba(255,255,255,0.25); }
        .input-area input:focus {
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }
        .input-area button {
            padding: 12px 22px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.2s;
        }
        .input-area button:hover { transform: scale(1.03); }
        .input-area button:active { transform: scale(0.97); }
        .input-area button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header">
        <h1>Local RAG with LLaMA 3.1</h1>
        <p><span class="status-dot"></span>Ask anything about your documents</p>
    </div>

    <div class="messages" id="chat">
        <div class="msg bot">👋 Hey! I'm your local AI assistant powered by your project docs. Ask me anything!</div>
    </div>

    <div class="input-area">
        <input type="text" id="queryInput" placeholder="Type your question…"
               autocomplete="off" autofocus>
        <button id="sendBtn">Ask</button>
    </div>
</div>

<script>
    // ── Base URL: auto-detect so it works whether you open via localhost:8000 or file:// ──
    const API_BASE = window.location.protocol === 'file:'
        ? 'http://localhost:8000'
        : '';

    const chat     = document.getElementById('chat');
    const input    = document.getElementById('queryInput');
    const sendBtn  = document.getElementById('sendBtn');
    let   sending  = false;

    // Send on Enter or click
    input.addEventListener('keydown', e => { if (e.key === 'Enter' && !sending) send(); });
    sendBtn.addEventListener('click', () => { if (!sending) send(); });

    async function send() {
        const q = input.value.trim();
        if (!q) return;

        sending = true;
        sendBtn.disabled = true;
        input.value = '';

        // User bubble
        addBubble(q, 'user');

        // Thinking indicator
        const thinkEl = addBubble('Thinking', 'thinking');

        // Bot bubble (we'll stream into it)
        const botEl = addBubble('', 'bot');
        botEl.style.display = 'none';  // hidden until first token

        try {
            const res = await fetch(API_BASE + '/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: q }),
            });

            if (!res.ok) {
                throw new Error('Server returned ' + res.status);
            }

            // Remove thinking, show bot bubble
            thinkEl.remove();
            botEl.style.display = '';

            const reader  = res.body.getReader();
            const decoder = new TextDecoder();
            let   text    = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                text += decoder.decode(value, { stream: true });
                botEl.innerHTML = renderMd(text);
                chat.scrollTop = chat.scrollHeight;
            }

            if (!text.trim()) {
                botEl.textContent = '(empty response — is Ollama running with llama3.1 pulled?)';
            }

        } catch (err) {
            thinkEl.remove();
            botEl.style.display = '';
            botEl.className = 'msg error';
            botEl.textContent = '⚠ ' + err.message
                + '\n\nMake sure:\n1. Open this page via http://localhost:8000\n2. Ollama is running (ollama serve)\n3. llama3.1 is pulled (ollama pull llama3.1)';
        }

        sending = false;
        sendBtn.disabled = false;
        input.focus();
    }

    function addBubble(text, cls) {
        const div = document.createElement('div');
        div.className = 'msg ' + cls;
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    // Minimal markdown → HTML
    function renderMd(raw) {
        let s = raw;
        // fenced code blocks
        s = s.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        // bold
        s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        // italic
        s = s.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');
        // inline code
        s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
        // line breaks
        s = s.replace(/\n/g, '<br>');
        return s;
    }
</script>
</body>
</html>
